<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lugares Turísticos del Mundo</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-primario: #1a3a5c;
      --color-secundario: #c0392b;
      --color-acento: #f39c12;
      --color-fondo: #f4f6f8;
      --color-texto: #2c3e50;
      --color-texto-claro: #7f8c8d;
      --fuente-titulo: 'Georgia', serif;
      --fuente-cuerpo: 'Arial', sans-serif;
      --sombra: 0 4px 16px rgba(0,0,0,0.12);
      --radio-borde: 12px;
    }

    body {
      font-family: var(--fuente-cuerpo);
      background-color: var(--color-fondo);
      color: var(--color-texto);
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, var(--color-primario) 0%, #2980b9 100%);
      color: white;
      text-align: center;
      padding: 3rem 1rem;
    }

    header h1 {
      font-family: var(--fuente-titulo);
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    header p {
      font-size: 1.1rem;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <header>
    <h1>Destinos Turísticos del Mundo</h1>
    <p>Descubre los lugares más fascinantes y emblemáticos del planeta</p>
  </header>
  <main>
  </main>
</body>
</html>
